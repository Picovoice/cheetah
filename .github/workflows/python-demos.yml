name: Python Demos

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/python-demos.yml'
      - 'demo/python/**'
      - '!demo/python/README.md'
  pull_request:
    branches: [ master, 'v[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+-.+', 'v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-.+' ]
    paths:
      - '.github/workflows/python-demos.yml'
      - 'demo/python/**'
      - '!demo/python/README.md'

defaults:
  run:
    working-directory: demo/python

jobs:
  build-github-hosted:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        device: [ cpu:1, cpu ]
        python-version: [ '3.9', '3.10', '3.11', '3.12', '3.13', '3.14' ]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Pre-build dependencies
      run: python -m pip install --upgrade pip

# ************** REMOVE AFTER RELEASE ********************
    - name: Build binding
      run: |
        python -m pip install setuptools wheel && cd ../../binding/python && python setup.py sdist bdist_wheel && python -m pip install --force-reinstall dist/pvcheetah-4.0.2-py3-none-any.whl
# ********************************************************

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Test
      run: >
        python cheetah_demo_file.py
        --access_key ${{secrets.PV_VALID_ACCESS_KEY}}
        --device ${{ matrix.device }}
        --wav_paths ../../resources/audio_samples/test_en.wav

    - name: Test get devices
      run: >
        python cheetah_demo_file.py
        --show_inference_devices

  build-self-hosted:
    runs-on: ${{ matrix.machine }}

    strategy:
      matrix:
        machine: [ rpi3-32, rpi3-64, rpi4-32, rpi4-64, rpi5-64, pv-windows-arm64 ]
        device: [ best ]
        include:
          - device: gpu
            machine: pv-linux
          - device: gpu
            machine: pv-windows
          - device: gpu
            machine: pv-ios

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python virtualenv (*nix)
      if: ${{ matrix.machine != 'pv-windows' && matrix.machine != 'pv-windows-igpu' && matrix.machine != 'pv-windows-arm64' }}
      run: |
        python3 -m venv .venv
        . .venv/bin/activate
        echo PATH=$PATH >> $GITHUB_ENV

    - name: Setup Python virtualenv (windows)
      if: ${{ matrix.machine == 'pv-windows' || matrix.machine == 'pv-windows-igpu' || matrix.machine == 'pv-windows-arm64' }}
      run: |
        python3 -m venv .venv --symlinks
        .venv\Scripts\activate
        echo PATH=$PATH >> $GITHUB_ENV

# ************** REMOVE AFTER RELEASE ********************
    - name: Build binding
      run: |
        python3 -m pip install setuptools wheel && cd ../../binding/python && python3 setup.py sdist bdist_wheel && python3 -m pip install --force-reinstall dist/pvcheetah-4.0.2-py3-none-any.whl
# ********************************************************

    - name: Pre-build dependencies
      run: python3 -m pip install --upgrade pip

    - name: Install dependencies
      run: python3 -m pip install -r requirements.txt

    - name: Test
      run: >
        python3 cheetah_demo_file.py
        --access_key ${{secrets.PV_VALID_ACCESS_KEY}}
        --device ${{ matrix.device }}
        --wav_paths ../../resources/audio_samples/test_en.wav

    - name: Test get devices
      run: >
        python3 cheetah_demo_file.py
        --show_inference_devices
